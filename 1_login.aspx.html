        var cancelAjax = false;

        function onRequestStart(ajaxManager, eventArgs) {
            if (cancelAjax) {
                eventArgs.EnableAjax = false;
            }
        }

        function StopPropagation(e) {
            //cancel bubbling  
            e.cancelBubble = true;
            if (e.stopPropagation) {
                e.stopPropagation();
            }
        }  

        function onButtonClicking(sender, args) {
            var item = args.get_item();

            if (item.get_attributes().getAttribute("ConfirmText") != null) {
                if (!confirm(item.get_attributes().getAttribute("ConfirmText"))) {
                    args.set_cancel(true);
                }
            }

            if (item.get_attributes().getAttribute("ValidateDirty") != null) {
                if (!CheckDirty()) {
                    args.set_cancel(true);
                }
            }

            if (item.get_attributes().getAttribute("ClearDirty") != null) {
                SetDirty(false);
            }

            if (item.get_attributes().getAttribute("SetDirty") != null) {
                SetDirty(true);
            }

            if (item.get_attributes().getAttribute("OnClickClientScript") != null) {
                eval(item.get_attributes().getAttribute("OnClickClientScript"));
                args.set_cancel(true);
            }

            if (item.get_attributes().getAttribute("NoAjax") != null)
                cancelAjax = true;
        }

    </script>
